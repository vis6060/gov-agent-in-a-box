global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Load your recording rules here (top-level, not under a job)
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]   # use the docker-compose service name

  # Optional but handy: scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
