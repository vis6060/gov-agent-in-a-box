groups:
- name: slo-rules
  interval: 15s
  rules:
  # p95 latency (5m window) for /v1/tasks
  - record: job:path:latency_p95_seconds:5m
    expr: |
      histogram_quantile(0.95,
        sum(rate(api_latency_seconds_bucket{path="/v1/tasks"}[5m])) by (le)
      )

  # request rate (rps) over 5m
  - record: job:path:req_rate_rps:5m
    expr: |
      sum(rate(api_requests_total{path="/v1/tasks"}[5m]))

  # error rate (5m)
  - record: job:path:error_rate:5m
    expr: |
      sum(rate(api_errors_total{path="/v1/tasks"}[5m])) /
      clamp_min(sum(rate(api_requests_total{path="/v1/tasks"}[5m])), 1)

  # success rate (5m)
  - record: job:path:success_rate:5m
    expr: |
      1 - job:path:error_rate:5m

  # cache hit-rate (5m)
  - record: rag:cache_hit_rate:5m
    expr: |
      sum(rate(rag_cache_hits_total[5m])) /
      clamp_min(sum(rate(rag_cache_hits_total[5m]) + rate(rag_cache_misses_total[5m])), 1)

  # SLO burn (99% SLO; error budget = 1%)
  # short window (5m) burn rate
  - record: slo:short_burn_rate
    expr: |
      job:path:error_rate:5m / 0.01

  # long window (1h) burn rate
  - record: slo:long_burn_rate
    expr: |
      (
        sum(rate(api_errors_total{path="/v1/tasks"}[1h])) /
        clamp_min(sum(rate(api_requests_total{path="/v1/tasks"}[1h])), 1)
      ) / 0.01
